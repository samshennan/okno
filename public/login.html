<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Okno - Sign In</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Okno">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <link rel="stylesheet" href="/vendor/inter.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #F0F0F3;
      color: #4A5A52;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: radial-gradient(circle at 20% 50%, rgba(143, 181, 165, 0.02) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(122, 148, 135, 0.03) 0%, transparent 50%);
      pointer-events: none;
    }

    .container {
      max-width: 420px;
      width: 100%;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .window-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 24px;
      background: #F0F0F3;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: -8px -8px 20px #FFFFFF,
        8px 8px 20px rgba(174, 174, 192, 0.4);
      animation: float 6s ease-in-out infinite;
      overflow: hidden;
    }

    .window-icon img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 12px;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-10px);
      }
    }

    h1 {
      font-size: 3.5rem;
      margin-bottom: 8px;
      font-weight: 300;
      letter-spacing: 0.15em;
      background: linear-gradient(135deg, #4A5A52 0%, #5A6B62 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      font-size: 1.125rem;
      font-weight: 400;
      font-style: italic;
      color: #7A9487;
      margin-bottom: 40px;
      letter-spacing: 0.03em;
    }

    .card {
      background: #F0F0F3;
      border-radius: 24px;
      padding: 40px 32px;
      box-shadow: -8px -8px 20px #FFFFFF,
        8px 8px 20px rgba(174, 174, 192, 0.4);
    }

    .card p {
      font-size: 0.95rem;
      color: #6E7F76;
      margin-bottom: 28px;
      line-height: 1.5;
    }

    a.sign-in-btn:focus-visible {
      outline: 2px solid #8FB5A5;
      outline-offset: 2px;
    }

    .sign-in-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 14px 32px;
      background: #F0F0F3;
      border: none;
      border-radius: 16px;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      color: #4A5A52;
      cursor: pointer;
      text-decoration: none;
      box-shadow: -4px -4px 12px #FFFFFF,
        4px 4px 12px rgba(174, 174, 192, 0.4);
      transition: all 0.2s ease;
    }

    .sign-in-btn:hover {
      box-shadow: -6px -6px 16px #FFFFFF,
        6px 6px 16px rgba(174, 174, 192, 0.5);
    }

    .sign-in-btn:active {
      box-shadow: inset 2px 2px 6px rgba(174, 174, 192, 0.4),
        inset -2px -2px 6px #FFFFFF;
    }

    .sign-in-btn svg {
      width: 20px;
      height: 20px;
    }

    .error-message {
      display: none;
      background: rgba(193, 80, 80, 0.08);
      border: 1px solid rgba(193, 80, 80, 0.2);
      border-radius: 12px;
      padding: 14px 20px;
      margin-bottom: 24px;
      font-size: 0.85rem;
      color: #8B4444;
      line-height: 1.5;
    }

    .error-message.visible {
      display: block;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="window-icon">
      <img src="/logo.svg" alt="Okno Logo"
        onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'%238FB5A5\' stroke-width=\'2\' stroke-linecap=\'round\' stroke-linejoin=\'round\'%3E%3Crect x=\'3\' y=\'3\' width=\'18\' height=\'18\' rx=\'2\' ry=\'2\' /%3E%3Cline x1=\'3\' y1=\'9\' x2=\'21\' y2=\'9\' /%3E%3Cline x1=\'9\' y1=\'21\' x2=\'9\' y2=\'9\' /%3E%3C/svg%3E'">
    </div>

    <h1>OKNO</h1>
    <p class="tagline">A Window in Time</p>

    <div class="card">
      <div id="error-box" class="error-message"></div>

      <p>Sign in with your Google account to start your personal photo frame.</p>

      <a href="/auth/login" class="sign-in-btn">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Sign in with Google
      </a>
    </div>
  </div>

  <script>
    // Show error messages from URL parameters
    (function() {
      const params = new URLSearchParams(window.location.search);
      const error = params.get('error');
      const errorBox = document.getElementById('error-box');

      if (error === 'oauth_failed') {
        errorBox.textContent = 'Sign in failed. Please try again.';
        errorBox.classList.add('visible');
      } else if (error === 'access_denied') {
        errorBox.textContent = 'This Okno instance is private. Ask the person who runs it to add your Google account.';
        errorBox.classList.add('visible');
      }

      // Redirect already-authenticated users to home
      fetch('/auth/status')
        .then(r => r.json())
        .then(data => {
          if (data.authenticated) {
            window.location.href = '/';
          }
        })
        .catch(() => {
          // Ignore -- user is not authenticated
        });
    })();
  </script>
</body>

</html>
